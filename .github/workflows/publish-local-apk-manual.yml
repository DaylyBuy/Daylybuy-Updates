name: Publish APK to latest.json

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.4). Leave empty to use latest release."
        required: false
      target_branch:
        description: "Branch to write releases/latest.json to"
        required: false
        default: "main"

  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          set -e
          sudo apt-get update -y
          sudo apt-get install -y jq python3-pip
          sudo apt-get install -y aapt || true

      - name: Resolve repository and release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_RELEASE_ID: ${{ github.event.release.id }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -e

          echo "REPO=$GITHUB_REPOSITORY" >> "$GITHUB_ENV"

          TARGET_BRANCH="$INPUT_TARGET_BRANCH"
          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="main"
          fi

          echo "TARGET_BRANCH=$TARGET_BRANCH" >> "$GITHUB_ENV"

          if [ "$EVENT_NAME" = "release" ] && [ -n "$EVENT_RELEASE_ID" ]; then
            TAG="$EVENT_RELEASE_TAG"
            RELEASE_ID="$EVENT_RELEASE_ID"

            echo "Using release event."
            echo "TAG=$TAG" >> "$GITHUB_ENV"
            echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
            echo "Using repo=$GITHUB_REPOSITORY tag=$TAG release_id=$RELEASE_ID branch=$TARGET_BRANCH"
            exit 0
          fi

          if [ -n "$INPUT_TAG" ]; then
            RELEASE_URL="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$INPUT_TAG"
          else
            RELEASE_URL="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest"
          fi

          echo "Fetching release:"
          echo "$RELEASE_URL"

          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$RELEASE_URL" > release.json

          echo "===== release.json ====="
          cat release.json | jq .
          echo "========================"

          RELEASE_TYPE="$(jq -r 'type' release.json)"
          if [ "$RELEASE_TYPE" != "object" ]; then
            echo "GitHub release API did not return an object."
            exit 1
          fi

          RELEASE_ID="$(jq -r '.id // empty' release.json)"
          TAG="$(jq -r '.tag_name // empty' release.json)"
          MESSAGE="$(jq -r '.message // empty' release.json)"

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ] || [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Could not resolve a valid GitHub Release."
            echo "Requested tag: ${INPUT_TAG:-latest}"
            echo "GitHub message: ${MESSAGE:-none}"
            echo ""
            echo "Fix:"
            echo "1. Make sure the GitHub Release exists."
            echo "2. Make sure the tag is exactly correct, for example v1.0.2."
            echo "3. Make sure the release is published, not only a local git tag."
            exit 1
          fi

          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"

          echo "Using repo=$GITHUB_REPOSITORY tag=$TAG release_id=$RELEASE_ID branch=$TARGET_BRANCH"

      - name: Find APK asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          ASSETS_API="https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}/assets"

          echo "Fetching release assets:"
          echo "$ASSETS_API"

          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$ASSETS_API" > assets.json

          echo "===== assets.json ====="
          cat assets.json | jq .
          echo "======================="

          ASSETS_TYPE="$(jq -r 'type' assets.json)"
          if [ "$ASSETS_TYPE" != "array" ]; then
            echo "GitHub assets API did not return an array."
            echo "This usually means RELEASE_ID is wrong, the release is missing, or GitHub returned an API error."
            exit 1
          fi

          APK_ID="$(jq -r '[.[] | select(.name | test("\\.apk$"; "i"))][0].id // empty' assets.json)"
          APK_NAME="$(jq -r '[.[] | select(.name | test("\\.apk$"; "i"))][0].name // empty' assets.json)"

          if [ -z "$APK_ID" ] || [ -z "$APK_NAME" ]; then
            echo "No .apk asset found on release ${TAG}."
            echo ""
            echo "Assets found:"
            jq -r '.[].name' assets.json || true
            echo ""
            echo "Fix:"
            echo "1. Open the GitHub Release."
            echo "2. Upload an APK file as a release asset."
            echo "3. Make sure the file name ends with .apk."
            echo "4. Run this workflow again."
            exit 1
          fi

          echo "APK_ID=$APK_ID" >> "$GITHUB_ENV"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

          echo "Found APK: $APK_NAME"
          echo "Asset ID: $APK_ID"

      - name: Download APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          curl -L \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${REPO}/releases/assets/${APK_ID}" \
            -o release.apk

          ls -lh release.apk

          if [ ! -s release.apk ]; then
            echo "Downloaded APK is empty."
            exit 1
          fi

      - name: Compute checksums and size
        run: |
          set -e

          SHA256="$(sha256sum release.apk | cut -d ' ' -f1)"
          MD5="$(md5sum release.apk | cut -d ' ' -f1)"
          SIZE="$(wc -c < release.apk)"

          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "MD5=$MD5" >> "$GITHUB_ENV"
          echo "SIZE=$SIZE" >> "$GITHUB_ENV"

          echo "sha256: $SHA256"
          echo "md5: $MD5"
          echo "size: $SIZE"

      - name: Extract versionCode and versionName from APK
        run: |
          set -e

          APK_VERSION_CODE=""
          APK_VERSION_NAME=""

          if command -v aapt >/dev/null 2>&1; then
            OUT="$(aapt dump badging release.apk | head -n1 || true)"
            APK_VERSION_CODE="$(echo "$OUT" | sed -n "s/.*versionCode='\([0-9]\+\)'.*/\1/p")"
            APK_VERSION_NAME="$(echo "$OUT" | sed -n "s/.*versionName='\([^']\+\)'.*/\1/p")"
          fi

          if [ -z "$APK_VERSION_CODE" ] || [ -z "$APK_VERSION_NAME" ]; then
            python3 -m pip install --quiet androguard

            PYOUT="$(python3 - <<'PY'
          from androguard.core.apk import APK
          a = APK("release.apk")
          print(a.get_androidversion_code() or "")
          print(a.get_androidversion_name() or "")
          PY
          )"

            APK_VERSION_CODE="$(echo "$PYOUT" | sed -n '1p')"
            APK_VERSION_NAME="$(echo "$PYOUT" | sed -n '2p')"
          fi

          if [ -z "$APK_VERSION_CODE" ] || [ -z "$APK_VERSION_NAME" ]; then
            echo "Failed to extract version info from APK."
            exit 1
          fi

          echo "APK_VERSION_CODE=$APK_VERSION_CODE" >> "$GITHUB_ENV"
          echo "APK_VERSION_NAME=$APK_VERSION_NAME" >> "$GITHUB_ENV"

          echo "apk versionCode: $APK_VERSION_CODE"
          echo "apk versionName: $APK_VERSION_NAME"

      - name: Build latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          mkdir -p releases

          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}" > release_for_notes.json

          NOTES_RAW="$(jq -r '.body // ""' release_for_notes.json)"
          NOTES_JSON="$(printf '%s' "$NOTES_RAW" | jq -Rs '.')"

          cat > releases/latest.json <<JSON
          {
            "versionName": "${APK_VERSION_NAME}",
            "versionCode": ${APK_VERSION_CODE},
            "apkUrl": "https://github.com/${REPO}/releases/download/${TAG}/${APK_NAME}",
            "sha256": "${SHA256}",
            "md5": "${MD5}",
            "size": ${SIZE},
            "releaseNotes": ${NOTES_JSON}
          }
          JSON

          echo "===== releases/latest.json ====="
          cat releases/latest.json | jq .
          echo "================================"

      - name: Upload latest.json via Contents API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          CONTENT_B64="$(base64 -w 0 releases/latest.json)"

          CURRENT_SHA="$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/releases/latest.json?ref=${TARGET_BRANCH}" \
            | jq -r '.sha // empty')"

          jq -nc \
            --arg msg "latest.json -> ${TAG} (APK vCode ${APK_VERSION_CODE})" \
            --arg content "$CONTENT_B64" \
            --arg branch "${TARGET_BRANCH}" \
            --arg sha "$CURRENT_SHA" \
            '{
              message: $msg,
              content: $content,
              branch: $branch
            } + (if $sha == "" then {} else {sha: $sha} end)' > payload.json

          RESP="$(curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/contents/releases/latest.json" \
            -d @payload.json)"

          echo "$RESP" | jq .

          if [ "$(echo "$RESP" | jq -r '.content.path // empty')" != "releases/latest.json" ]; then
            echo "Failed to update releases/latest.json on ${TARGET_BRANCH}"
            exit 1
          fi

      - name: Show raw URL
        run: |
          echo "latest.json path:"
          echo "https://raw.githubusercontent.com/${REPO}/${TARGET_BRANCH}/releases/latest.json"
